services:
  mongodbi_db:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db   # bind it to mongo at this path
  custom_app:
    build: ./         # build using a dockerfile
    ports:
      - "3000:3000"

# create a volume
volumes:
  mongodb-data:         # equivalent to volumes: {}       yaml syntax jargon